<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ترکر عادت‌های روزانه</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a4731;
    --green-mid: #2d6a4f;
    --green-accent: #40916c;
    --green-light: #52b788;
    --green-pale: #b7e4c7;
    --green-bg: #d8f3dc;
    --cream: #fafff7;
    --white: #ffffff;
    --dark: #0d1f16;
    --gray: #6b7c74;
    --red: #e63946;
    --red-light: #ffe0e0;
    --gold: #f4a261;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(82,183,136,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(45,106,79,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    padding: 32px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 0; right: 0;
    height: 40px;
    background: var(--cream);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .header-emoji { font-size: 36px; display: block; margin-bottom: 6px; }
  .header h1 {
    font-size: 22px; font-weight: 800; color: white;
    letter-spacing: -0.5px; margin-bottom: 4px;
  }
  .header p { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 300; }

  /* Date nav */
  .date-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 20px 12px;
  }
  .date-nav button {
    width: 40px; height: 40px; border-radius: 12px;
    border: 1.5px solid var(--green-pale);
    background: white; color: var(--green-accent);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .date-nav button:active { transform: scale(0.92); background: var(--green-bg); }
  .date-display { text-align: center; }
  .date-display .day-num {
    font-size: 32px; font-weight: 800; color: var(--green-dark);
    line-height: 1;
  }
  .date-display .day-name {
    font-size: 12px; color: var(--gray); font-weight: 400; margin-top: 2px;
  }
  .date-display .month-name {
    font-size: 14px; font-weight: 600; color: var(--green-accent); margin-top: 1px;
  }

  /* Progress ring */
  .progress-section {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 20px 20px;
  }
  .progress-ring-wrap { position: relative; width: 120px; height: 120px; }
  .progress-ring-wrap svg { transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--green-bg); stroke-width: 10; }
  .progress-ring-fill {
    fill: none; stroke: var(--green-light); stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .progress-pct { font-size: 26px; font-weight: 800; color: var(--green-dark); line-height: 1; }
  .progress-label { font-size: 10px; color: var(--gray); margin-top: 2px; }
  .progress-counts {
    display: flex; gap: 20px; margin-top: 12px;
  }
  .count-item { text-align: center; }
  .count-num { font-size: 20px; font-weight: 700; }
  .count-num.done { color: var(--green-accent); }
  .count-num.fail { color: var(--red); }
  .count-num.left { color: var(--gray); }
  .count-lbl { font-size: 10px; color: var(--gray); }

  /* Habits list */
  .habits-section { padding: 0 16px; }
  .section-title {
    font-size: 12px; font-weight: 600; color: var(--gray);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 0 4px 10px;
  }

  .habit-card {
    background: white;
    border-radius: 16px;
    margin-bottom: 10px;
    display: flex; align-items: center;
    padding: 14px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    border: 1.5px solid transparent;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    overflow: hidden;
  }
  .habit-card::before {
    content: ''; position: absolute;
    inset: 0; opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .habit-card.done {
    border-color: var(--green-pale);
    background: linear-gradient(135deg, #f0fff4, white);
  }
  .habit-card.done::before { background: radial-gradient(circle at 50% 50%, rgba(82,183,136,0.08), transparent); opacity: 1; }
  .habit-card.fail {
    border-color: #ffc8c8;
    background: linear-gradient(135deg, #fff5f5, white);
  }
  .habit-card:active { transform: scale(0.97); }

  .habit-emoji { font-size: 24px; margin-left: 12px; min-width: 30px; text-align: center; }
  .habit-info { flex: 1; }
  .habit-name { font-size: 15px; font-weight: 600; color: var(--dark); }
  .habit-streak { font-size: 11px; color: var(--gray); margin-top: 2px; }

  .habit-btn {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    transition: all 0.2s;
    flex-shrink: 0;
    border: 2px solid var(--green-pale);
    background: var(--green-bg);
    color: var(--gray);
  }
  .habit-card.done .habit-btn {
    background: var(--green-light);
    border-color: var(--green-accent);
    color: white;
    box-shadow: 0 4px 12px rgba(82,183,136,0.4);
  }
  .habit-card.fail .habit-btn {
    background: var(--red);
    border-color: #c0392b;
    color: white;
    box-shadow: 0 4px 12px rgba(230,57,70,0.4);
  }

  /* Tap hint */
  .tap-hint {
    text-align: center; font-size: 11px; color: var(--gray);
    padding: 4px 0 16px;
  }

  /* Month overview */
  .month-section { padding: 16px 16px 0; }
  .month-grid {
    background: white; border-radius: 20px;
    padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .month-grid-title {
    font-size: 14px; font-weight: 700; color: var(--green-dark);
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .days-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .day-cell {
    aspect-ratio: 1; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .day-cell.today { ring: 2px solid var(--green-accent); outline: 2px solid var(--green-accent); }
  .day-cell.future { background: #f5f5f5; color: #ccc; cursor: default; }
  .day-cell.empty-score { background: #f0f0f0; color: #aaa; }
  .day-cell.score-low { background: #ffe5e5; color: var(--red); }
  .day-cell.score-mid { background: #fff3cd; color: #d97706; }
  .day-cell.score-high { background: var(--green-bg); color: var(--green-accent); }
  .day-cell.score-full { background: var(--green-light); color: white; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--green-bg);
    display: flex; padding: 8px 0 20px;
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; padding: 4px;
    transition: all 0.15s;
  }
  .nav-btn:active { transform: scale(0.9); }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-lbl { font-size: 10px; color: var(--gray); font-weight: 500; }
  .nav-btn.active .nav-lbl { color: var(--green-accent); }
  .nav-btn.active .nav-icon { filter: drop-shadow(0 0 4px rgba(64,145,108,0.5)); }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* Stats view */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    padding: 20px 16px;
  }
  .stat-card {
    background: white; border-radius: 16px; padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    text-align: center;
  }
  .stat-card .stat-val { font-size: 28px; font-weight: 800; color: var(--green-dark); }
  .stat-card .stat-lbl { font-size: 11px; color: var(--gray); margin-top: 4px; }

  .streak-list { padding: 0 16px; }
  .streak-item {
    background: white; border-radius: 14px; padding: 14px 16px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .streak-item .s-emoji { font-size: 22px; }
  .streak-item .s-name { font-size: 14px; font-weight: 600; flex: 1; }
  .streak-item .s-streak { font-size: 20px; font-weight: 800; color: var(--gold); }
  .streak-item .s-unit { font-size: 10px; color: var(--gray); }

  /* Animations */
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.25s ease-out; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .habit-card { animation: fadeIn 0.3s ease-out both; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <span class="header-emoji">🌿</span>
    <h1>ترکر عادت‌های روزانه</h1>
    <p>هر روز یه قدم بهتر</p>
  </div>

  <!-- Today View -->
  <div class="view active" id="view-today">
    <div class="date-nav">
      <button onclick="changeDay(-1)">›</button>
      <div class="date-display">
        <div class="day-num" id="day-num">—</div>
        <div class="day-name" id="day-name">—</div>
        <div class="month-name" id="month-name">—</div>
      </div>
      <button onclick="changeDay(1)">‹</button>
    </div>

    <div class="progress-section">
      <div class="progress-ring-wrap">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle class="progress-ring-bg" cx="60" cy="60" r="52"/>
          <circle class="progress-ring-fill" id="progress-ring" cx="60" cy="60" r="52"
            stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
        </svg>
        <div class="progress-center">
          <span class="progress-pct" id="progress-pct">0%</span>
          <span class="progress-label">امروز</span>
        </div>
      </div>
      <div class="progress-counts">
        <div class="count-item">
          <div class="count-num done" id="cnt-done">0</div>
          <div class="count-lbl">✓ انجام شد</div>
        </div>
        <div class="count-item">
          <div class="count-num fail" id="cnt-fail">0</div>
          <div class="count-lbl">✗ نشد</div>
        </div>
        <div class="count-item">
          <div class="count-num left" id="cnt-left">0</div>
          <div class="count-lbl">باقی‌مونده</div>
        </div>
      </div>
    </div>

    <div class="habits-section">
      <div class="section-title">عادت‌های امروز</div>
      <div id="habits-list"></div>
      <div class="tap-hint">یه بار ضربه = ✓ انجام شد &nbsp;|&nbsp; دوباره = ✗ نشد &nbsp;|&nbsp; سه بار = خالی</div>
    </div>
  </div>

  <!-- Month View -->
  <div class="view" id="view-month">
    <div class="month-section">
      <div style="padding: 20px 4px 12px; font-size: 18px; font-weight: 800; color: var(--green-dark);">
        📅 نمای ماهانه
      </div>
      <div class="month-grid">
        <div class="month-grid-title" id="month-grid-title">—</div>
        <div class="days-grid" id="days-grid"></div>
      </div>
      <div style="padding: 16px 4px 0; display: flex; gap: 8px; flex-wrap: wrap;">
        <span style="font-size:11px;color:var(--gray);">🟩 عالی (+80%)&nbsp; 🟨 خوب (50-80%)&nbsp; 🟥 ضعیف (&lt;50%)&nbsp; ⬜ ثبت نشده</span>
      </div>
    </div>
  </div>

  <!-- Stats View -->
  <div class="view" id="view-stats">
    <div style="padding: 20px 16px 8px; font-size: 18px; font-weight: 800; color: var(--green-dark);">📊 آمار کلی</div>
    <div class="stats-grid" id="stats-grid"></div>
    <div style="padding: 0 16px 8px; font-size: 13px; font-weight: 700; color: var(--green-dark);">🔥 بهترین رکوردها</div>
    <div class="streak-list" id="streak-list"></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <span class="nav-icon">☀️</span>
    <span class="nav-lbl">امروز</span>
  </div>
  <div class="nav-btn" id="nav-month" onclick="switchView('month')">
    <span class="nav-icon">📅</span>
    <span class="nav-lbl">ماه</span>
  </div>
  <div class="nav-btn" id="nav-stats" onclick="switchView('stats')">
    <span class="nav-icon">📊</span>
    <span class="nav-lbl">آمار</span>
  </div>
</div>

<script>
const HABITS = [
  {id:'sleep',  emoji:'😴', name:'۸ ساعت خواب'},
  {id:'water',  emoji:'💧', name:'۸ لیوان آب'},
  {id:'shower', emoji:'🚿', name:'دوش آب سرد'},
  {id:'sport',  emoji:'🏃', name:'ورزش'},
  {id:'read',   emoji:'📚', name:'مطالعه کتاب'},
  {id:'work',   emoji:'💼', name:'کار کردن'},
  {id:'plan',   emoji:'📋', name:'برنامه‌ریزی'},
  {id:'nomob',  emoji:'📵', name:'بدون موبایل اول صبح'},
  {id:'med',    emoji:'🧘', name:'مدیتیشن ۱۰ دقیقه'},
  {id:'nosugar',emoji:'🚫', name:'بدون شکر/فست‌فود'},
  {id:'task',   emoji:'✅', name:'یه کار مهم رو تموم کن'},
  {id:'gratit', emoji:'🙏', name:'قدردانی روزانه'},
  {id:'nosmoke',emoji:'🚭', name:'سیگار نکشیدن'},
];

const MONTHS_FA = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const DAYS_FA   = ['یک‌شنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];

// ── تبدیل میلادی به شمسی (الگوریتم تست‌شده) ───────────────────
function getJalali(date) {
  // Use Intl API — built into every modern browser, always correct
  try {
    const parts = new Intl.DateTimeFormat('fa-IR', {
      calendar: 'persian',
      year: 'numeric', month: 'numeric', day: 'numeric',
      numberingSystem: 'latn'
    }).formatToParts(date);
    const get = t => parseInt(parts.find(p => p.type === t).value);
    return { y: get('year'), m: get('month') - 1, d: get('day') };
  } catch(e) {
    // fallback: rough offset
    const d = new Date(date);
    d.setDate(d.getDate() - 79);
    return { y: d.getFullYear() - 621, m: d.getMonth(), d: d.getDate() };
  }
}

// State
let currentDate = new Date();
currentDate.setHours(0,0,0,0);

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem('habits_data') || '{}'); } catch(e) { return {}; }
}
function saveData(data) {
  localStorage.setItem('habits_data', JSON.stringify(data));
}

function getDay(data, key) {
  return data[key] || {};
}

function cycleHabit(habitId) {
  const data = loadData();
  const key = dateKey(currentDate);
  if (!data[key]) data[key] = {};
  const cur = data[key][habitId] || 0; // 0=empty, 1=done, 2=fail
  data[key][habitId] = cur === 0 ? 1 : cur === 1 ? 2 : 0;
  saveData(data);
  renderToday();
  
  // Pop animation
  const card = document.getElementById('card-' + habitId);
  if (card) { card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop'); }
}

function renderToday() {
  const data = loadData();
  const key = dateKey(currentDate);
  const dayData = getDay(data, key);

  // Date display (Jalali)
  const dayNames = ['یک‌شنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];
  const jal = getJalali(currentDate);
  document.getElementById('day-num').textContent = jal.d;
  document.getElementById('day-name').textContent = dayNames[currentDate.getDay()];
  document.getElementById('month-name').textContent = MONTHS_FA[jal.m] + ' ' + jal.y;

  // Counts
  let done = 0, fail = 0;
  HABITS.forEach(h => {
    if (dayData[h.id] === 1) done++;
    else if (dayData[h.id] === 2) fail++;
  });
  const left = HABITS.length - done - fail;
  document.getElementById('cnt-done').textContent = done;
  document.getElementById('cnt-fail').textContent = fail;
  document.getElementById('cnt-left').textContent = left;

  // Progress ring
  const pct = Math.round((done / HABITS.length) * 100);
  document.getElementById('progress-pct').textContent = pct + '%';
  const circumference = 326.7;
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('progress-ring').style.strokeDashoffset = offset;
  const ringColor = pct >= 80 ? '#40916c' : pct >= 50 ? '#f4a261' : '#e63946';
  document.getElementById('progress-ring').style.stroke = ringColor;

  // Habits list
  const list = document.getElementById('habits-list');
  list.innerHTML = '';
  HABITS.forEach((h, i) => {
    const state = dayData[h.id] || 0;
    const cls = state === 1 ? 'done' : state === 2 ? 'fail' : '';
    const icon = state === 1 ? '✓' : state === 2 ? '✗' : '○';
    
    // streak
    let streak = 0;
    let d = new Date(currentDate);
    d.setDate(d.getDate() - 1);
    while(true) {
      const dk = dateKey(d);
      if (data[dk] && data[dk][h.id] === 1) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }

    const card = document.createElement('div');
    card.className = `habit-card ${cls}`;
    card.id = 'card-' + h.id;
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <span class="habit-emoji">${h.emoji}</span>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        ${streak > 0 ? `<div class="habit-streak">🔥 ${streak} روز متوالی</div>` : '<div class="habit-streak">شروع کن!</div>'}
      </div>
      <div class="habit-btn">${icon}</div>
    `;
    card.onclick = () => cycleHabit(h.id);
    list.appendChild(card);
  });
}

// تبدیل شمسی به میلادی با binary search روی Intl API
function toGregorian(jy, jm, jd) {
  // تخمین اولیه میلادی
  let gYear = jy + 621;
  let gMonth = jm; // تقریبی
  let guess = new Date(gYear, gMonth, jd);
  // با binary search دقیق کن
  for(let i = 0; i < 60; i++) {
    const j = getJalali(guess);
    if(j.y === jy && j.m === jm && j.d === jd) return guess;
    const diffDays = (jy - j.y)*365 + (jm - j.m)*30 + (jd - j.d);
    if(diffDays === 0) return guess;
    guess = new Date(guess.getTime() + diffDays * 86400000);
  }
  return guess;
}

function isJalaliLeap(jy) {
  const leaps = [1,5,9,13,17,22,26,30];
  return leaps.includes(((jy - 474) % 2820 + 474) % 2820 % 128);
}

// تعداد روزهای ماه شمسی
function jalaliDaysInMonth(jy, jm) {
  if(jm < 6) return 31;
  if(jm < 11) return 30;
  // اسفند
  const isLeap = ((((jy-474)%2820)+474+38)*682)%2816 < 682;
  return isLeap ? 30 : 29;
}

function renderMonth() {
  const data = loadData();
  const jal = getJalali(currentDate);
  const jYear = jal.y, jMonth = jal.m;

  document.getElementById('month-grid-title').textContent = `${MONTHS_FA[jMonth]} ${jYear}`;

  const daysInMonth = jalaliDaysInMonth(jYear, jMonth);
  // اول ماه شمسی چه روزیه؟
  const firstOfMonth = toGregorian(jYear, jMonth, 1);
  // روز هفته: شنبه=0، یک‌شنبه=1، ...، جمعه=6
  const jsDay = firstOfMonth.getDay(); // 0=Sun
  const iranFirst = (jsDay + 1) % 7; // شنبه اول

  const today = new Date(); today.setHours(0,0,0,0);
  const todayJal = getJalali(today);

  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';

  // سرستون‌های روز هفته (شنبه تا جمعه)
  ['ش','ی','د','س','چ','پ','ج'].forEach(d => {
    const h = document.createElement('div');
    h.style.cssText = 'text-align:center;font-size:10px;font-weight:700;color:var(--gray);padding:4px 0;';
    h.textContent = d;
    grid.appendChild(h);
  });

  // خانه‌های خالی اول
  for(let i=0; i<iranFirst; i++) grid.appendChild(document.createElement('div'));

  for(let d=1; d<=daysInMonth; d++) {
    const gregDate = toGregorian(jYear, jMonth, d);
    const key = dateKey(gregDate);
    const dayData = data[key] || {};

    let done = 0;
    HABITS.forEach(h => { if(dayData[h.id]===1) done++; });
    const pct = done / HABITS.length;

    const isFuture = gregDate > today;
    const isToday = todayJal.y===jYear && todayJal.m===jMonth && todayJal.d===d;
    const hasData = Object.keys(dayData).length > 0;

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.textContent = d;

    if(isFuture) cell.classList.add('future');
    else if(!hasData) cell.classList.add('empty-score');
    else if(pct>=0.8) cell.classList.add('score-full');
    else if(pct>=0.5) cell.classList.add('score-high');
    else if(pct>=0.3) cell.classList.add('score-mid');
    else cell.classList.add('score-low');

    if(isToday) cell.classList.add('today');

    cell.onclick = () => { currentDate = gregDate; switchView('today'); };
    grid.appendChild(cell);
  }
}

function renderStats() {
  const data = loadData();
  const allKeys = Object.keys(data).sort();
  
  let totalDays = 0, totalDone = 0, totalFail = 0;
  let bestDay = 0, bestDayDate = '';
  
  allKeys.forEach(key => {
    const dayData = data[key];
    let d = 0, f = 0;
    HABITS.forEach(h => {
      if (dayData[h.id] === 1) d++;
      else if (dayData[h.id] === 2) f++;
    });
    if (d + f > 0) {
      totalDays++;
      totalDone += d;
      totalFail += f;
      const pct = d / HABITS.length;
      if (pct > bestDay) { bestDay = pct; bestDayDate = key; }
    }
  });
  
  const avgPct = totalDays > 0 ? Math.round((totalDone / (totalDays * HABITS.length)) * 100) : 0;
  const perfectDays = allKeys.filter(k => {
    const dd = data[k];
    return HABITS.every(h => dd[h.id] === 1);
  }).length;

  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = '';
  [
    {val: totalDays + ' روز', lbl: 'روزهای ثبت‌شده'},
    {val: avgPct + '%', lbl: 'میانگین کل'},
    {val: perfectDays + ' روز', lbl: 'روزهای کامل 💯'},
    {val: Math.round(bestDay*100) + '%', lbl: 'بهترین روز'},
  ].forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div>`;
    statsGrid.appendChild(card);
  });

  // Streaks per habit
  const streakList = document.getElementById('streak-list');
  streakList.innerHTML = '';
  
  const habitStreaks = HABITS.map(h => {
    let streak = 0;
    let d = new Date(); d.setHours(0,0,0,0);
    while(true) {
      const dk = dateKey(d);
      if (data[dk] && data[dk][h.id] === 1) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }
    return {...h, streak};
  }).sort((a,b) => b.streak - a.streak);
  
  habitStreaks.forEach(h => {
    const item = document.createElement('div');
    item.className = 'streak-item';
    item.innerHTML = `
      <span class="s-emoji">${h.emoji}</span>
      <span class="s-name">${h.name}</span>
      <span class="s-streak">${h.streak}</span>
      <span class="s-unit"> روز</span>
    `;
    streakList.appendChild(item);
  });
}

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('nav-' + view).classList.add('active');
  
  if (view === 'today') renderToday();
  else if (view === 'month') renderMonth();
  else if (view === 'stats') renderStats();
}

function changeDay(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  renderToday();
}

// Init
renderToday();
</script>
